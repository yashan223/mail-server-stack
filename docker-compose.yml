version: '3.8'

services:
  postfix:
    build:
      context: ./postfix
    container_name: mail-postfix
    restart: unless-stopped
    hostname: ${HOSTNAME:-mail.example.com}
    domainname: ${DOMAIN:-example.com}
    ports:
      - "${PORT_SMTP:-25}:25"
      - "${PORT_SMTPS:-465}:465"
      - "${PORT_SUBMISSION:-587}:587"
    environment:
      - DOMAIN=${DOMAIN:-example.com}
      - HOSTNAME=${HOSTNAME:-mail.example.com}
      - TZ=${TZ:-UTC}
    volumes:
      - mail-data:/var/mail
      - dovecot-sockets:/var/run/dovecot
      - ./ssl:/etc/ssl/mail
      - ./postfix/virtual_users:/etc/postfix/virtual_users
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - mail-net
    depends_on:
      - dovecot
      - opendkim

  dovecot:
    build:
      context: ./dovecot
    container_name: mail-dovecot
    restart: unless-stopped
    hostname: ${HOSTNAME:-mail.example.com}
    domainname: ${DOMAIN:-example.com}
    ports:
      - "${PORT_IMAP:-143}:143"
      - "${PORT_IMAPS:-993}:993"
    environment:
      - DOMAIN=${DOMAIN:-example.com}
      - HOSTNAME=${HOSTNAME:-mail.example.com}
      - TZ=${TZ:-UTC}
    volumes:
      - mail-data:/var/mail
      - dovecot-sockets:/var/run/dovecot
      - ./dovecot/passwd:/etc/dovecot/passwd
      - ./ssl:/etc/ssl/mail
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - mail-net

  opendkim:
    build:
      context: ./opendkim
    container_name: mail-opendkim
    restart: unless-stopped
    hostname: ${HOSTNAME:-mail.example.com}
    domainname: ${DOMAIN:-example.com}
    environment:
      - DOMAIN=${DOMAIN:-example.com}
      - TZ=${TZ:-UTC}
    volumes:
      - ./opendkim/keys:/etc/opendkim/keys
    networks:
      - mail-net

  webmail:
    image: roundcube/roundcubemail:latest
    container_name: mail-webmail
    restart: unless-stopped
    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=ssl://dovecot
      - ROUNDCUBEMAIL_DEFAULT_PORT=993
      - ROUNDCUBEMAIL_SMTP_SERVER=tls://postfix
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_DB_TYPE=sqlite
    entrypoint: >
      /bin/sh -c "
      chown -R www-data:www-data /var/www/html/db &&
      exec /docker-entrypoint.sh apache2-foreground
      "
    volumes:
      - ./webmail/config.inc.php:/var/www/html/config/config.inc.php:ro
      - webmail-db:/var/www/html/db
    networks:
      - mail-net
    depends_on:
      - postfix
      - dovecot

  nginx:
    image: nginx:alpine
    container_name: mail-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - HOSTNAME=${HOSTNAME:-mail.example.com}
      - NGINX_ENVSUBST_FILTER=HOSTNAME
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./ssl:/etc/ssl/mail:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - mail-net
    depends_on:
      - webmail

volumes:
  mail-data:
    driver: local
  dovecot-sockets:
    driver: local
  webmail-db:
    driver: local

networks:
  mail-net:
    driver: bridge
