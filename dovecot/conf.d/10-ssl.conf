ssl = required

ssl_cert = </etc/ssl/mail/cert.pem
ssl_key = </etc/ssl/mail/key.pem

ssl_min_protocol = TLSv1.2
ssl_cipher_list = ALL:!kAnull:!aNULL:!kECDH:!DSS:!ECDSA:!kDH:!ADH:!EXPORT:!DES:!3DES:!RC4:!MD5:!PSK:!aDSS:!EDH-DSS-DES-CBC3-SHA:!EDH-RSA-DES-CBC3-SHA:!KRB5-DES-CBC3-SHA

ssl_prefer_server_ciphers = yes
