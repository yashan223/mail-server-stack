service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

service lmtp {
  unix_listener lmtp {
    path = /var/run/dovecot/lmtp
    mode = 0666
  }
}

service auth {
  unix_listener auth {
    path = /var/run/dovecot/auth
    mode = 0666
  }
}

service auth-worker {
  user = root
}
